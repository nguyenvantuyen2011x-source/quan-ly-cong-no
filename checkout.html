<!DOCTYPE html>
<html lang="vi">
<head><meta charset="UTF-8"><title>Thanh toán</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="flex items-center justify-center h-screen bg-gray-100">
    <div class="bg-white p-8 rounded shadow text-center">
        <h2 class="text-xl font-bold mb-4">Xác nhận thanh toán</h2>
        <button onclick="pay()" class="bg-green-600 text-white px-6 py-2 rounded">Hoàn tất thanh toán</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = parseInt(urlParams.get('id'));

        function pay() {
            let debts = JSON.parse(localStorage.getItem('debts'));
            let d = debts.find(x => x.id === id);
            if(d) {
                d.status = 'paid';
                localStorage.setItem('debts', JSON.stringify(debts));
                alert("Thanh toán thành công!");
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
