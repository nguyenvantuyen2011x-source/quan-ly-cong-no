<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-4">Quản trị Công Nợ</h1>
        <div class="bg-white p-6 rounded shadow mb-6">
            <input type="text" id="name" placeholder="Tên khách" class="border p-2 w-full mb-2">
            <input type="number" id="amount" placeholder="Số tiền" class="border p-2 w-full mb-2">
            <input type="date" id="date" class="border p-2 w-full mb-2">
            <button onclick="addDebt()" class="bg-blue-600 text-white px-4 py-2 rounded">Thêm nợ</button>
        </div>
        <table class="w-full bg-white shadow rounded">
            <thead><tr class="bg-gray-200">
                <th class="p-2">Khách</th><th class="p-2">Tiền</th><th class="p-2">Trạng thái</th><th class="p-2">Xóa</th>
            </tr></thead>
            <tbody id="adminList"></tbody>
        </table>
        <a href="index.html" class="mt-4 inline-block text-blue-600">← Về trang khách hàng</a>
    </div>

    <script>
        function addDebt() {
            let debts = JSON.parse(localStorage.getItem('debts')) || [];
            debts.push({ id: Date.now(), name: document.getElementById('name').value, amount: document.getElementById('amount').value, date: document.getElementById('date').value, status: 'unpaid' });
            localStorage.setItem('debts', JSON.stringify(debts));
            location.reload();
        }
